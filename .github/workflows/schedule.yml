name: Daily DSE Scraper to Firebase

on:
  schedule:
    # প্রতিদিন বাংলাদেশ সময় বিকেল ৪:০০ টায় রান হবে (UTC সকাল ১০:০০ টা)
    - cron: '0 10 * * *'
  workflow_dispatch: # হাত দিয়ে যেকোনো সময় টেস্ট করার জন্য

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          # এখানে থাকা cache অপশনটি বাদ দেওয়া হয়েছে যাতে লক ফাইল না খোঁজে

      - name: Install Dependencies
        run: npm install

      - name: Run Scraper and Update Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node updater.js
